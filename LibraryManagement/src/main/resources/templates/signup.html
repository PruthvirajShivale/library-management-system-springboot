<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Portal - Registration</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-6 text-slate-800">

    <!-- Background Glow -->
    <div class="absolute w-[500px] h-[500px] bg-emerald-300/20 blur-3xl rounded-full -top-40 -left-40"></div>
    <div class="absolute w-[400px] h-[400px] bg-blue-300/20 blur-3xl rounded-full -bottom-40 -right-40"></div>

    <!-- Main Card -->
    <div class="relative w-full max-w-md">

        <div class="bg-white/90 backdrop-blur-xl border border-slate-200 shadow-2xl rounded-2xl overflow-hidden">

            <!-- Header -->
            <div class="p-6 text-center border-b border-slate-100 bg-gradient-to-r from-emerald-50 to-blue-50">
                <div class="w-14 h-14 mx-auto flex items-center justify-center rounded-xl bg-emerald-600 text-white shadow-md">
                    <i class="fa-solid fa-user-plus text-xl"></i>
                </div>

                <h1 class="text-xl font-bold mt-3 text-slate-800">Create Member Account</h1>
                <p class="text-xs text-slate-500 mt-1">
                    Access your digital library workspace
                </p>
            </div>

            <!-- Notice -->
            <div class="p-4">
                <div class="flex gap-3 p-3 rounded-xl bg-amber-50 border border-amber-200 text-amber-800 text-xs">
                    <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
                    <span>
                        Registration requires pre-authorization from Admin whitelist system before activation.
                    </span>
                </div>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="px-4">
                <div class="flex gap-2 p-3 rounded-xl bg-rose-50 border border-rose-200 text-rose-700 text-sm">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${error}"></span>
                </div>
            </div>

            <!-- Form -->
            <form th:action="@{/auth/signup}" method="post" class="p-6 space-y-4">

                <!-- Name -->
                <div>
                    <label class="text-xs font-semibold text-slate-600">Full Name</label>
                    <div class="relative mt-1">
                        <i class="fa-solid fa-user absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" name="name" required
                            class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                                   focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 outline-none transition"
                            placeholder="John Doe">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="text-xs font-semibold text-slate-600">Email Address</label>
                    <div class="relative mt-1">
                        <i class="fa-solid fa-envelope absolute left-3 top-3 text-slate-400"></i>
                        <input type="email" name="email" required
                            class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                                   focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 outline-none transition"
                            placeholder="name@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="text-xs font-semibold text-slate-600">Password</label>
                    <div class="relative mt-1">
                        <i class="fa-solid fa-lock absolute left-3 top-3 text-slate-400"></i>
                        <input type="password" name="password" required
                            class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm
                                   focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl
                           shadow-md shadow-emerald-500/20 transition-all active:scale-[0.98] text-sm">
                    <i class="fa-solid fa-check mr-1"></i> Complete Registration
                </button>
            </form>

            <!-- Footer -->
            <div class="px-6 pb-6 text-center">
                <a href="/"
                   class="text-xs text-slate-500 hover:text-emerald-600 inline-flex items-center gap-1 hover:underline">
                    <i class="fa-solid fa-arrow-left text-[10px]"></i>
                    Back to Login
                </a>
            </div>

        </div>
    </div>

</body>
</html>
